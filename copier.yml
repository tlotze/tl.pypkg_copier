_subdirectory: template
_templates_suffix: ""

project_name:
  type: str

project_description:
  type: str

author:
  type: str

author_email:
  type: str

package_name:
  type: str
  default: "{{ project_name.lower().replace(' ', '_').replace('-', '_') }}"

python_version:
  type: str
  default: 3.14

source_url:
  type: str

github_user:
  type: str

github_url:
  type: str
  default: "{% if github_user %}https://github.com/{{ github_user }}/{{ package_name }}{% endif %}"

_tasks:
  - "uv lock"
